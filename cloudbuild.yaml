steps:
  # Pull existing image (for caching)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull gcr.io/$PROJECT_ID/node-web-app:latest || exit 0
  
  # Build docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/node-web-app', '--cache-from', 'gcr.io/$PROJECT_ID/node-web-app', '.']
  
  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ["push", "gcr.io/$PROJECT_ID/node-web-app"]
  
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'node-web-app', 
           '--image', 'gcr.io/$PROJECT_ID/node-web-app:latest', 
           '--region', 'us-central1', 
           '--allow-unauthenticated', 
           '--port', '8888']

# Use the Cloud Build service account (not Compute Engine)
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/$PROJECT_NUMBER-compute@developer.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/node-web-app:latest'
